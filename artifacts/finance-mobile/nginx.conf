server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;

    # Service worker must never be cached long-term — it's the update mechanism.
    location = /sw.js {
        add_header Cache-Control "no-cache";
        try_files /sw.js =404;
    }

    location = /manifest.json {
        # nginx's built-in types map always resolves `.json` to
        # application/json before `default_type` gets a chance to apply, and
        # `add_header Content-Type` only ADDS a second header rather than
        # replacing it — browsers then see two conflicting Content-Type
        # headers. `types {}` here clears the extension mapping for this
        # location only, so `default_type` is finally the one used.
        types { }
        default_type application/manifest+json;
        add_header Cache-Control "no-cache";
        try_files /manifest.json =404;
    }

    # Hashed static assets (JS/CSS/fonts) — safe to cache aggressively.
    location /_expo/static/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Expo Router static export produces one HTML file per route
    # (e.g. /onboarding.html for /onboarding) — fall back to that, then to
    # the SPA shell for any client-side-only route.
    location / {
        try_files $uri $uri.html /index.html;
    }
}
