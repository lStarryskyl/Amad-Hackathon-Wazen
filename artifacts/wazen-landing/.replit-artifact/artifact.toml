kind = "web"
previewPath = "/"
title = "Wazen — AI Finance"
version = "1.0.0"
id = "artifacts/wazen-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20646

[services.development]
run = "pnpm --filter @workspace/wazen-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/wazen-landing", "run", "build" ]
publicDir = "artifacts/wazen-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20646"
BASE_PATH = "/"
