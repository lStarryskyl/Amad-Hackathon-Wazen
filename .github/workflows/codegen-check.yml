name: Codegen drift check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  codegen-check:
    name: Check generated client is up-to-date
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run codegen
        run: pnpm codegen

      - name: Check for drift
        shell: bash
        run: |
          CHANGED=$(git status --porcelain -- \
            lib/api-client-react/src/generated/ \
            lib/api-zod/src/generated/)
          if [ -n "$CHANGED" ]; then
            echo ""
            echo "$CHANGED"
            echo ""
            echo "------------------------------------------------------------"
            echo "ERROR: Generated client is out of date."
            echo ""
            echo "The files above were added or changed by running 'pnpm codegen'."
            echo "Please run 'pnpm codegen' locally and commit the result"
            echo "before pushing."
            echo "------------------------------------------------------------"
            exit 1
          fi
